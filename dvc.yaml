stages:
  prepare:
    cmd: python -m ue5_vehicle_synth.data.prepare --raw data/raw --out data/processed
    deps:
      - data/raw
      - src/ue5_vehicle_synth/data/prepare.py
    outs:
      - data/processed
  train:
    cmd: python -m ue5_vehicle_synth.training.train
    deps:
      - data/processed
      - src/ue5_vehicle_synth
      - configs
    params:
      - params.yaml:
    outs:
      - artifacts/checkpoints
    metrics:
      - reports/metrics.json:
          cache: false
